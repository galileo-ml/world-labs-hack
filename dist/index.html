<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Museum</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        font-family: 'Georgia', serif;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
      }

      #fade-overlay {
        position: fixed;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s ease;
        z-index: 10;
      }

      #fade-overlay.fading {
        opacity: 1;
        pointer-events: all;
      }

      #loading-indicator {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 11;
      }

      #loading-indicator.visible {
        opacity: 1;
      }

      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      #loading-text {
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.8;
      }

      #hud {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.85);
        font-size: 13px;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        z-index: 5;
        pointer-events: none;
      }

      #back-btn {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 28px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: #fff;
        font-family: 'Georgia', serif;
        font-size: 13px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
        backdrop-filter: blur(4px);
        z-index: 5;
        display: none;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      #back-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.7);
      }

      #tooltip {
        position: fixed;
        background: rgba(0, 0, 0, 0.75);
        color: #fff;
        padding: 8px 14px;
        border-radius: 3px;
        font-size: 13px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: 5;
        white-space: nowrap;
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      #tooltip.visible {
        opacity: 1;
      }

      #tooltip .tooltip-title {
        font-weight: bold;
        margin-bottom: 2px;
      }

      #tooltip .tooltip-artist {
        font-size: 11px;
        opacity: 0.75;
        font-style: italic;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-Dylp7K4p.js"></script>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="fade-overlay"></div>
    <div id="loading-indicator">
      <div class="loading-spinner"></div>
      <div id="loading-text">Loading world...</div>
    </div>
    <div id="hud">Grand Museum</div>
    <button id="back-btn">Back to Museum</button>
    <div id="tooltip">
      <div class="tooltip-title" id="tooltip-title"></div>
      <div class="tooltip-artist" id="tooltip-artist"></div>
    </div>
  </body>
</html>
