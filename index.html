<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Museum</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        font-family: 'Georgia', serif;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
      }

      /* Small pointer-lock hint — only visible when mouse is not captured */
      #start-overlay {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.45);
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        z-index: 6;
        pointer-events: none;
      }

      #hud {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.85);
        font-size: 13px;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        z-index: 5;
        pointer-events: none;
      }

      #back-btn {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 28px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: #fff;
        font-family: 'Georgia', serif;
        font-size: 13px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
        backdrop-filter: blur(4px);
        z-index: 5;
        display: none;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      #back-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.7);
      }

      /* Tooltip — kept in DOM but not actively shown in proximity mode */
      #tooltip {
        position: fixed;
        background: rgba(0, 0, 0, 0.75);
        color: #fff;
        padding: 8px 14px;
        border-radius: 3px;
        font-size: 13px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: 5;
        white-space: nowrap;
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      #tooltip.visible {
        opacity: 1;
      }

      #tooltip .tooltip-title {
        font-weight: bold;
        margin-bottom: 2px;
      }

      #tooltip .tooltip-artist {
        font-size: 11px;
        opacity: 0.75;
        font-style: italic;
      }

      #back-hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.6);
        font-family: 'Georgia', serif;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        z-index: 5;
        pointer-events: none;
        display: none;
      }

      #coords {
        position: fixed;
        bottom: 16px;
        right: 16px;
        color: #fff;
        font-family: monospace;
        font-size: 14px;
        background: rgba(0, 0, 0, 0.55);
        padding: 6px 10px;
        border-radius: 4px;
        z-index: 6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>

    <div id="start-overlay">Click to capture mouse</div>

    <div id="hud">Grand Museum</div>
    <button id="back-btn">Back to Museum</button>
    <div id="back-hint">Press B to return to museum</div>

    <div id="tooltip">
      <div class="tooltip-title" id="tooltip-title"></div>
      <div class="tooltip-artist" id="tooltip-artist"></div>
    </div>

    <div id="coords">x: 0.00  y: 0.00  z: 0.00</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
